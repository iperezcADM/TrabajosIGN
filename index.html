<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Ferretería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-8bFch1e0xPz4Icm+GBJbT3gyPP5P3s3trl7T/0V8Zq0HsVn2gYx1RMdRR9r+z3bz" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">F</div>
        <div>
          <h1>Sistema Inventario Ferretería</h1>
          <p>Acceso al sistema</p>
        </div>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="form-bottom">
          <label class="checkbox">
            <input type="checkbox" id="remember">
            <span>Recordarme</span>
          </label>
          <button type="button" id="forgotButton" class="ghost">Olvidé mi contraseña</button>
        </div>
        <button type="submit" class="primary-btn">Ingresar</button>
        <p class="login-hint">Para pruebas usa cualquier usuario y contraseña.</p>
      </form>
      <div id="loginMessage" class="login-message"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-1f5vYpXkK2F7l4r9FkQ9sU9oI6F0kU8f4f3TOC4C2d0V8qG1b9TqK7pL3sB6c4fT" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
